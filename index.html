<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo">WS<span>Chat</span></div>
    <span id="latency"></span>
    <button id="btn-username">rename</button>
    <span id="status-label">connecting</span>
    <div id="status-dot"></div>
  </header>

  <aside id="sidebar">
    <div class="sidebar-label">online</div>
    <div id="user-list"></div>
  </aside>

  <main id="messages"></main>

  <footer id="input-bar">
    <input id="msg-input" type="text" placeholder="Message…" disabled maxlength="1000" autocomplete="off" />
    <button id="btn-send" disabled title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Change username</h2>
    <p>Pick a new display name (max 32 chars).</p>
    <input id="modal-input" type="text" maxlength="32" placeholder="Your name…" />
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-confirm">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
